<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบยืม-คืนอุปกรณ์ด้วย QR Code</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { margin-top: 0; color: #1e3c72; font-size: 1.3rem; border-bottom: 2px solid #f0f2f5; padding-bottom: 8px; }
        
        /* ปรับแต่งกล่องแสดงภาพกล้องให้สวยงาม */
        #reader {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            margin-bottom: 10px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .btn-primary { background-color: #1e3c72; color: white; }
        .btn-primary:hover { background-color: #2a5298; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-success:hover { background-color: #218838; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-danger:hover { background-color: #c82333; }
        
        .result-box {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .info-row:last-child { border-bottom: none; }
        .label { font-weight: bold; color: #666; }
        .value { font-weight: 500; text-align: right; }
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .badge-success { background-color: #d4edda; color: #155724; }
        .badge-danger { background-color: #f8d7da; color: #721c24; }
        
        #message {
            text-align: center;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
        }
        .msg-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .msg-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .config-box {
            font-size: 0.9rem;
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #1e3c72;
        }
        .config-box input {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            box-sizing: border-box;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 1.6rem;">📦 ระบบยืม-คืนอุปกรณ์</h1>
            <p style="margin:5px 0 0 0; opacity:0.8; font-size:0.9rem;">เวอร์ชัน GitHub Pages เปิดกล้องตรง ไม่ซ้ำซ้อน</p>
        </div>

        <div class="config-box">
            <label><strong>🔗 วาง Web App URL จาก Google Apps Script:</strong></label>
            <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec" onchange="saveUrl()">
        </div>

        <div id="message"></div>

        <div class="card" style="text-align: center;">
            <h2>📷 กล้องสแกน QR Code</h2>
            <div id="reader"></div>
            <button class="btn btn-primary" id="toggleScanBtn" onclick="startScanner()" style="margin-top:15px;">▶️ เริ่มเปิดกล้องสแกน</button>
        </div>

        <div id="resultBox" class="card result-box">
            <h2>📋 ข้อมูลอุปกรณ์ที่สแกนพบ</h2>
            <div class="info-row">
                <span class="label">ID อุปกรณ์:</span>
                <span class="value" id="resId">-</span>
            </div>
            <div class="info-row">
                <span class="label">ชื่ออุปกรณ์:</span>
                <span class="value" id="resName">-</span>
            </div>
            <div class="info-row">
                <span class="label">รายละเอียด:</span>
                <span class="value" id="resDesc">-</span>
            </div>
            <div class="info-row">
                <span class="label">จำนวนทั้งหมด:</span>
                <span class="value" id="resTotal">-</span>
            </div>
            <div class="info-row">
                <span class="label">พร้อมใช้งานตอนนี้:</span>
                <span class="value" id="resAvailable">-</span>
            </div>
            
            <div style="margin-top: 25px;">
                <button class="btn btn-success" id="btnBorrow" onclick="processAction('borrow')">🤝 ทำรายการยืม (ลดคลังลง 1)</button>
                <button class="btn btn-danger" id="btnReturn" onclick="processAction('return')">↩️ 做ทำรายการคืน (เพิ่มคลังเข้า 1)</button>
            </div>
        </div>
    </div>

    <script>
        let html5QrCode = null;
        let lastScannedId = null;

        window.onload = function() {
            const savedUrl = localStorage.getItem("gas_web_app_url") || "";
            document.getElementById("scriptUrl").value = savedUrl;
        }

        function saveUrl() {
            const url = document.getElementById("scriptUrl").value.trim();
            localStorage.setItem("gas_web_app_url", url);
        }

        function getWebAppUrl() {
            const url = document.getElementById("scriptUrl").value.trim();
            if (!url) {
                showMsg("❌ กรุณาวาง Web App URL ที่ได้จาก Google Sheets ในช่องด้านบนก่อนครับ", "error");
                return null;
            }
            return url;
        }

        function showMsg(text, type) {
            const msgBox = document.getElementById("message");
            msgBox.innerText = text;
            msgBox.className = type === "success" ? "msg-success" : "msg-error";
            msgBox.style.display = "block";
        }

        // ฟังก์ชันเปิดกล้องตรงทันที ไม่แสดงปุ่มซ้ำซ้อน
        function startScanner() {
            showMsg("⏳ กำลังเรียกเปิดใช้งานกล้อง...", "success");
            document.getElementById("toggleScanBtn").style.display = "none";
            
            if(!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            // สั่งเปิดกล้องหลัง (environment) ทันที
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText, decodedResult) => {
                    // เมื่อสแกนสำเร็จ: ให้หยุดกล้องแล้วไปดึงข้อมูล
                    showMsg("🎯 สแกนสำเร็จ! กำลังปิดกล้องเพื่อดึงข้อมูล...", "success");
                    html5QrCode.stop().then(() => {
                        document.getElementById("toggleScanBtn").style.display = "block";
                        document.getElementById("toggleScanBtn").innerText = "🔄 เปิดกล้องสแกนชิ้นถัดไป";
                        lastScannedId = decodedText;
                        fetchItemDetails(decodedText);
                    }).catch(err => console.error("Error stopping scanner", err));
                },
                (errorMessage) => {
                    // กำลังค้นหาคิวอาร์โค้ดในเฟรมภาพ (ปล่อยข้ามไม่ต้องแสดง error)
                }
            ).catch(err => {
                console.error(err);
                showMsg("❌ ไม่สามารถเปิดกล้องได้: โปรดตรวจสอบว่าคุณได้กดยอมรับสิทธิ์ให้เบราว์เซอร์เข้าถึงกล้องแล้วหรือยัง", "error");
                document.getElementById("toggleScanBtn").style.display = "block";
            });
        }

        function fetchItemDetails(id) {
            const url = getWebAppUrl();
            if (!url) return;

            showMsg("⏳ กำลังดึงข้อมูลจาก Google Sheets...", "success");
            document.getElementById("resultBox").style.display = "none";

            fetch(url, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "scan", id: id })
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === "success") {
                    showMsg("✨ โหลดข้อมูลสำเร็จ", "success");
                    displayItem(result.data);
                } else {
                    showMsg("❌ " + result.message, "error");
                }
            })
            .catch(error => {
                console.error(error);
                showMsg("⚠️ การเชื่อมต่อฐานข้อมูลล้มเหลว ตรวจสอบการตั้งค่า Deploy ใน Apps Script", "error");
            });
        }

        function displayItem(item) {
            document.getElementById("resId").innerText = item.id;
            document.getElementById("resName").innerText = item.name;
            document.getElementById("resDesc").innerText = item.description || "-";
            document.getElementById("resTotal").innerText = item.totalQuantity;
            
            const availSpan = document.getElementById("resAvailable");
            availSpan.innerText = item.availableQuantity;
            
            if (parseInt(item.availableQuantity) <= 0) {
                availSpan.className = "value badge badge-danger";
                document.getElementById("btnBorrow").disabled = true;
                document.getElementById("btnBorrow").style.opacity = 0.5;
            } else {
                availSpan.className = "value badge badge-success";
                document.getElementById("btnBorrow").disabled = false;
                document.getElementById("btnBorrow").style.opacity = 1;
            }
            
            document.getElementById("resultBox").style.display = "block";
        }

        function processAction(actionType) {
            const url = getWebAppUrl();
            if (!url || !lastScannedId) return;

            const actionText = actionType === 'borrow' ? 'ยืม' : 'คืน';
            showMsg(`⏳ กำลังบันทึกรายการ${actionText}ลงระบบ...`, "success");

            fetch(url, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: actionType, id: lastScannedId })
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === "success") {
                    showMsg(`🎉 ทำรายการ${actionText}อุปกรณ์สำเร็จแล้ว!`, "success");
                    displayItem(result.data);
                } else {
                    showMsg("❌ ผิดพลาด: " + result.message, "error");
                }
            })
            .catch(error => {
                console.error(error);
                showMsg("⚠️ ไม่สามารถบันทึกข้อมูลได้", "error");
            });
        }
    </script>
</body>
</html>
