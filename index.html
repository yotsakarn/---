<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบยืม-คืนอุปกรณ์และเวชภัณฑ์ทางการแพทย์ สาขาชุมชน</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            color: #333;
        }
        /* แถบหัวข้อสีน้ำเงินตามแบบ */
        .main-header {
            background-color: #4669b4;
            color: white;
            text-align: center;
            padding: 15px 20px;
            font-size: 1.4rem;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 15px;
        }
        /* แถบเมนูด้านบน */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background-color: white;
            border: 1px solid #ced4da;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            color: #495057;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: #4669b4;
            color: white;
            border-color: #4669b4;
        }
        /* กล่องค้นหาและตะกร้า */
        .search-bar-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 1rem;
        }
        .cart-btn {
            background-color: #4669b4;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        /* แสดงตารางการ์ดไอเทม */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .item-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #e9ecef;
        }
        .item-img {
            width: 100%;
            height: 140px;
            object-fit: contain;
            margin-bottom: 10px;
            background-color: #fafafa;
            border-radius: 4px;
        }
        .item-name {
            font-weight: bold;
            font-size: 1.05rem;
            margin: 5px 0;
            min-height: 44px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .item-desc {
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 10px;
            min-height: 32px;
        }
        .stock-badge {
            display: inline-block;
            background-color: #e2f6ea;
            color: #155724;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .stock-badge.empty {
            background-color: #f8d7da;
            color: #721c24;
        }
        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
            margin-top: auto;
        }
        .qty-input {
            width: 45px;
            padding: 6px;
            text-align: center;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }
        .btn-action {
            flex: 1;
            background-color: #4669b4;
            color: white;
            border: none;
            padding: 8px 5px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-action.return-mode {
            background-color: #dc3545;
        }
        /* กล่องตั้งค่า URL */
        .config-box {
            background: #e9ecef;
            padding: 10px;
            text-align: center;
            font-size: 0.85rem;
        }
        .config-box input {
            width: 300px;
            padding: 4px;
        }
    </style>
</head>
<body>

    <div class="main-header">
        ระบบยืม-คืนอุปกรณ์และเวชภัณฑ์ทางการแพทย์ สาขาชุมชน
    </div>

    <div class="config-box">
        🔗 วาง Web App URL: <input type="text" id="scriptUrl" onchange="saveUrl()" placeholder="https://script.google.com/macros/s/.../exec">
        <button onclick="loadAllItems()">🔄 ดึงข้อมูลใหม่</button>
    </div>

    <div class="container">
        <div class="nav-tabs">
            <button class="tab-btn active" id="tabBorrow" onclick="switchMode('borrow')">ยืมของ</button>
            <button class="tab-btn" id="tabReturn" onclick="switchMode('return')">คืนของ</button>
            <button class="tab-btn">ประวัติการยืม-คืน</button>
            <button class="tab-btn">สถิติ</button>
            <button class="tab-btn">จัดการอุปกรณ์</button>
        </div>

        <div class="search-bar-container">
            <input type="text" class="search-input" id="searchBox" oninput="filterItems()" placeholder="ค้นหาชื่ออุปกรณ์ หรือรายละเอียด...">
            <button class="cart-btn">ตะกร้า (0)</button>
        </div>

        <div id="loadingText" style="text-align:center; font-weight:bold; margin:20px 0;">⏳ กำลังเชื่อมต่อดึงข้อมูลเวชภัณฑ์...</div>

        <div class="items-grid" id="itemsContainer"></div>
    </div>

    <script>
        let allItems = [];
        let currentMode = 'borrow'; // หรือ 'return'

        window.onload = function() {
            const savedUrl = localStorage.getItem("gas_web_app_url") || "";
            document.getElementById("scriptUrl").value = savedUrl;
            if(savedUrl) {
                loadAllItems();
            }
        }

        function saveUrl() {
            localStorage.setItem("gas_web_app_url", document.getElementById("scriptUrl").value.trim());
            loadAllItems();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tabBorrow').className = mode === 'borrow' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tabReturn').className = mode === 'return' ? 'tab-btn active' : 'tab-btn';
            renderCards(allItems);
        }

        function loadAllItems() {
            const url = document.getElementById("scriptUrl").value.trim();
            if(!url) return;
            
            document.getElementById("loadingText").style.display = "block";
            document.getElementById("itemsContainer").innerHTML = "";

            fetch(url, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "fetchAll" })
            })
            .then(res => res.json())
            .then(res => {
                document.getElementById("loadingText").style.display = "none";
                if(res.status === "success") {
                    allItems = res.data;
                    renderCards(allItems);
                } else {
                    alert("เกิดข้อผิดพลาด: " + res.message);
                }
            })
            .catch(err => {
                document.getElementById("loadingText").innerText = "⚠️ ไม่สามารถเชื่อมต่อหลังบ้านได้ ตรวจสอบการตั้งค่า Web App";
                console.error(err);
            });
        }

        function renderCards(items) {
            const container = document.getElementById("itemsContainer");
            container.innerHTML = "";

            if(items.length === 0) {
                container.innerHTML = "<p style='grid-column:1/-1; text-align:center; color:#888;'>ไม่พบข้อมูลรายการเวชภัณฑ์</p>";
                return;
            }

            items.forEach(item => {
                const isOutOfStock = parseInt(item.availableQuantity) <= 0;
                const badgeClass = isOutOfStock ? "stock-badge empty" : "stock-badge";
                const btnText = currentMode === 'borrow' ? 'ใส่ตะกร้า' : 'ส่งคืนคลัง';
                const btnClass = currentMode === 'borrow' ? 'btn-action' : 'btn-action return-mode';
                
                // ถ้ารูปภาพไม่มี ให้ใช้รูปตัวอย่างชั่วคราว
                const imgUrl = item.image && item.image.startsWith('http') ? item.image : 'https://placehold.co/150x140?text=No+Image';

                container.innerHTML += `
                    <div class="item-card">
                        <div>
                            <img src="${imgUrl}" class="item-img" alt="${item.name}">
                            <div class="item-name">${item.name}</div>
                            <div class="item-desc">${item.description || ''}</div>
                        </div>
                        <div>
                            <div class="${badgeClass}">คงเหลือ ${item.availableQuantity}</div>
                            <div class="action-row">
                                <span style="font-size:0.8rem; color:#666;">ระบุจำนวน:</span>
                                <input type="number" class="qty-input" id="qty_${item.id}" value="1" min="1">
                                <button class="${btnClass}" onclick="submitTransaction('${item.id}')">${btnText}</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filterItems() {
            const keyword = document.getElementById("searchBox").value.toLowerCase();
            const filtered = allItems.filter(item => 
                item.name.toLowerCase().includes(keyword) || 
                (item.description && item.description.toLowerCase().includes(keyword))
            );
            renderCards(filtered);
        }

        function submitTransaction(id) {
            const url = document.getElementById("scriptUrl").value.trim();
            const qty = parseInt(document.getElementById(`qty_${id}`).value) || 1;
            
            if(!url) return;

            if(confirm(`ยืนยันการทำรายการ ${currentMode === 'borrow' ? 'ยืม' : 'คืน'} เป็นจำนวน ${qty} ชิ้น?`)) {
                fetch(url, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: currentMode, id: id, quantity: qty })
                })
                .then(res => res.json())
                .then(res => {
                    if(res.status === "success") {
                        alert("🎉 ทำรายการสำเร็จแล้ว!");
                        loadAllItems(); // รีโหลดข้อมูลล่าสุดมาอัปเดตตัวเลขหน้าจอ
                    } else {
                        alert("❌ ไม่สามารถทำรายการได้: " + res.message);
                    }
                })
                .catch(err => alert("เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย"));
            }
        }
    </script>
</body>
</html>
