<script>
        let cart = [];
        let allBorrowedItems = [];
        let myPieChart = null;
        let myBarChart = null;
        let currentManageItems = [];
        window.allItems = [];
        let html5QrCodeScanner = null;

        let dataCacheFlags = { items: true, return: true, history: true, stats: true };
        function markDataStale() { dataCacheFlags = { items: true, return: true, history: true, stats: true }; }

        // 🔗 URL ระบบ Google Apps Script ของคุณ
        const API_URL = "https://script.google.com/macros/s/AKfycbzNp3PG-2gADMw5WfFcwrQ0vAcwjnoBR4pzSwTBWrzZ8sgXz_m5f23T5oA-DhWVzRuwpA/exec";

        // ปรับแต่งตัวรับส่งข้อมูลให้ห่อวัตถุลงใน "data" ตามที่ Apps Script รอแกะคำสั่ง
        async function callAPI(action, data = {}, method = 'POST') {
            let url = API_URL;
            const options = {
                method: method,
                redirect: 'follow'
            };

            if (method === 'POST') {
                options.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
                options.body = JSON.stringify({ action: action, data: data }); 
            } else {
                const params = new URLSearchParams({ action, ...data });
                url += `?${params.toString()}`;
            }

            const response = await fetch(url, options);
            if (!response.ok) throw new Error('การเชื่อมต่อเซิร์ฟเวอร์ผิดพลาด');
            return await response.json();
        }

        function showLoader() { document.getElementById('loader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }
        function showAlert(msg, icon = 'success') { Swal.fire({ text: msg, icon: icon, confirmButtonColor: 'var(--primary-color)' }); }

        function showModal(id) { const m = document.getElementById(id); if(m) m.classList.add('active'); }
        function hideModal(id) { const m = document.getElementById(id); if(m) m.classList.remove('active'); }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const targetView = document.getElementById(viewId);
            if(targetView) targetView.classList.add('active');
            
            const activeBtn = document.querySelector(`[data-view="${viewId}"]`);
            if(activeBtn) activeBtn.classList.add('active');

            if (viewId === 'items-view' && dataCacheFlags.items) loadItems();
            if (viewId === 'history-view' && dataCacheFlags.history) loadHistory();
            if (viewId === 'stats-view' && dataCacheFlags.stats) loadStats();
        }

        window.onload = function() {
            document.querySelectorAll('.nav-btn[data-view]').forEach(btn => {
                btn.addEventListener('click', function() {
                    showView(this.getAttribute('data-view'));
                });
            });

            document.getElementById('cart-toggle-btn').addEventListener('click', () => { renderCart(); showModal('cart-modal'); });
            document.getElementById('cart-close-btn').addEventListener('click', () => hideModal('cart-modal'));
            document.getElementById('scan-qr-btn').addEventListener('click', startQRScanner);
            
            document.getElementById('search-input').addEventListener('input', e => filterItems(e.target.value));
            document.getElementById('history-search-input').addEventListener('input', e => filterHistoryTable(e.target.value));
            document.getElementById('return-search-input').addEventListener('input', e => { 
                if(!e.target.value.trim()) { 
                    document.getElementById('return-body').innerHTML='<tr><td colspan="8" style="text-align:center; padding:20px;">กรุณาพิมพ์ค้นหาชื่อผู้ยืมด้านบน</td></tr>'; 
                    return; 
                } 
                searchBorrowedItems(e.target.value); 
            });
            
            document.getElementById('select-all-returns').addEventListener('change', function() {
                document.querySelectorAll('.return-checkbox').forEach(cb => cb.checked = this.checked);
            });
            document.getElementById('return-selected-btn').addEventListener('click', submitReturns);

            loadItems();
        };

        function loadItems() {
            showLoader();
            callAPI('getItems', {}, 'GET')
                .then(res => {
                    dataCacheFlags.items = false; hideLoader();
                    window.allItems = res; renderItemsGrid(res);
                })
                .catch(e => { hideLoader(); showAlert(e.message || e, 'error'); });
        }

        function renderItemsGrid(items) {
            const container = document.getElementById('items-container');
            if(!items || items.length === 0 || items.error) { container.innerHTML = '<p style="grid-column:1/-1; text-align:center;">ไม่พบข้อมูลอุปกรณ์ในระบบ</p>'; return; }
            let html = '';
            items.forEach(item => {
                const isOut = item.availableQuantity <= 0;
                html += `
                <div class="item-card" style="${isOut ? 'opacity:0.65;' : ''}">
                    <img src="${item.image || getDefaultImage()}" alt="${item.name}">
                    <h4 style="margin-bottom:5px; font-size:16px;">${item.name}</h4>
                    <p style="font-size:12px; color:var(--dark-gray); height:35px; overflow:hidden; margin-bottom:8px;">${item.description || '-'}</p>
                    <p style="font-size:14px; margin-bottom:10px;">คงเหลือ: <span style="font-weight:bold; color:${isOut?'var(--danger)':'var(--success)'};">${item.availableQuantity}</span> / ${item.totalQuantity}</p>
                    <button class="btn" style="width:100%; background:${isOut?'var(--dark-gray)':'var(--primary-color)'}; color:white;" ${isOut?'disabled':''} onclick="addToCart('${item.id}')">${isOut?'สินค้าหมด':'🛒 เพิ่มลงตะกร้า'}</button>
                </div>`;
            });
            container.innerHTML = html;
        }

        // 🌟 ค้นหาได้ทั้งชื่อ และ รหัส ID ตรงตัวจากการสแกนคิวอาร์โค้ด
        function filterItems(keyword) {
            if(!keyword.trim()) { renderItemsGrid(window.allItems); return; }
            const lowerKeyword = keyword.toLowerCase().trim();
            const filtered = window.allItems.filter(i => 
                (i.id && String(i.id).toLowerCase() === lowerKeyword) || 
                (i.name && i.name.toLowerCase().includes(lowerKeyword)) || 
                (i.description && i.description.toLowerCase().includes(lowerKeyword))
            );
            renderItemsGrid(filtered);
        }

        function addToCart(id) {
            const item = window.allItems.find(i => i.id == id); if(!item) return;
            const inCart = cart.find(c => c.id == id);
            if(inCart) {
                if(inCart.qty >= item.availableQuantity) { showAlert('ขออภัย จำนวนคงเหลือไม่เพียงพอ','warning'); return; }
                inCart.qty++;
            } else {
                cart.push({ id: item.id, name: item.name, available: item.availableQuantity, qty: 1 });
            }
            updateCartCount(); Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: `เพิ่ม ${item.name} สำเร็จ`, showConfirmButton: false, timer: 1500 });
        }

        function updateCartCount() {
            const total = cart.reduce((sum, c) => sum + c.qty, 0);
            document.getElementById('cart-count').textContent = total;
        }

        function renderCart() {
            const container = document.getElementById('cart-items-list');
            if(cart.length === 0) { container.innerHTML = '<p style="text-align:center; padding:15px; color:var(--dark-gray);">ไม่มีสินค้าในตะกร้า</p>'; document.getElementById('borrow-btn').disabled = true; return; }
            document.getElementById('borrow-btn').disabled = false;
            let html = '<table style="box-shadow:none; margin:0;"><thead><tr><th>ชื่ออุปกรณ์</th><th style="width:100px; text-align:center;">จำนวน</th><th style="width:60px;"></th></tr></thead><tbody>';
            cart.forEach(c => {
                html += `<tr><td>${c.name}</td><td style="text-align:center;"><input type="number" value="${c.qty}" min="1" max="${c.available}" style="width:60px; text-align:center; padding:3px;" onchange="updateCartQty('${c.id}', this.value)"></td><td><button type="button" style="color:var(--danger); background:none; border:none; cursor:pointer; font-weight:bold;" onclick="removeFromCart('${c.id}')">ลบ</button></td></tr>`;
            });
            html += '</tbody></table>'; container.innerHTML = html;
        }

        function updateCartQty(id, val) {
            const num = parseInt(val); const c = cart.find(i => i.id == id); if(!c) return;
            if(num > c.available) { showAlert(`ยืมได้สูงสุดแค่ ${c.available} ชิ้น`,'warning'); c.qty = c.available; renderCart(); return; }
            if(num <= 0) { removeFromCart(id); return; }
            c.qty = num; updateCartCount();
        }

        function removeFromCart(id) { cart = cart.filter(c => c.id != id); updateCartCount(); renderCart(); }

        document.getElementById('borrow-form').addEventListener('submit', function(e) {
            e.preventDefault(); if(cart.length===0) return;
            const borrowerName = document.getElementById('borrower-name').value.trim();
            const returnDate = document.getElementById('expected-return-date').value;
            if(!borrowerName) return;
            showLoader();
            const itemsPayload = cart.map(c => ({ id: c.id, qty: c.qty }));
            
            callAPI('processBorrowLogic', { borrowerName, returnDate, items: itemsPayload })
                .then(res => {
                    hideLoader();
                    if(res.success) { showAlert('ทำรายการยืมสำเร็จเรียบร้อย!'); cart = []; updateCartCount(); document.getElementById('borrow-form').reset(); hideModal('cart-modal'); markDataStale(); loadItems(); }
                    else { showAlert(res.error, 'error'); }
                })
                .catch(e => { hideLoader(); showAlert(e.message || e, 'error'); });
        });

        function searchBorrowedItems(q) {
            document.getElementById('return-body').innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px;">กำลังค้นหาข้อมูล...</td></tr>';
            callAPI('searchBorrowedItems', q, 'POST')
                .then(res => {
                    allBorrowedItems = res; renderReturnTable(res);
                })
                .catch(e => { document.getElementById('return-body').innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--danger);">เกิดข้อผิดพลาด: ${e.message||e}</td></tr>`; });
        }

        function renderReturnTable(list) {
            const tbody = document.getElementById('return-body');
            if(!list || list.length===0 || list.error) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px;">ไม่พบรายการค้างยืมของผู้ใช้คนนี้</td></tr>'; return; }
            let html = '';
            list.forEach(item => {
                html += `
                <tr>
                    <td style="text-align:center;"><input type="checkbox" class="return-checkbox" value="${item.historyId}"></td>
                    <td>${item.historyId}</td>
                    <td>${item.borrowerName}</td>
                    <td>${item.itemName}</td>
                    <td style="text-align:center; font-weight:bold; color:var(--warning);">${item.borrowQty}</td>
                    <td>${item.borrowDate}</td>
                    <td><input type="number" id="good-${item.historyId}" value="${item.borrowQty}" min="0" max="${item.borrowQty}" style="width:60px; text-align:center; padding:3px;" oninput="calculateConsumed('${item.historyId}', ${item.borrowQty})"></td>
                    <td><input type="number" id="cons-${item.historyId}" value="0" min="0" max="${item.borrowQty}" style="width:60px; text-align:center; padding:3px; border-color:var(--danger);" oninput="calculateGood('${item.historyId}', ${item.borrowQty})"></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function calculateConsumed(id, max) {
            const goodVal = parseInt(document.getElementById(`good-${id}`).value) || 0;
            document.getElementById(`cons-${id}`).value = Math.max(0, max - goodVal);
        }
        function calculateGood(id, max) {
            const consVal = parseInt(document.getElementById(`cons-${id}`).value) || 0;
            document.getElementById(`good-${id}`).value = Math.max(0, max - consVal);
        }

        function submitReturns() {
            const checked = document.querySelectorAll('.return-checkbox:checked');
            if(checked.length === 0) { showAlert('กรุณาเลือกรายการค้างยืมที่ต้องการคืนอย่างน้อย 1 รายการ', 'warning'); return; }
            Swal.fire({
                title: 'ชื่อผู้ทำการรับคืน', input: 'text', inputPlaceholder: 'ระบุชื่อเจ้าหน้าที่ผู้รับคืน...', showCancelButton: true, confirmButtonColor: 'var(--primary-color)', confirmButtonText: 'ยืนยันส่งข้อมูล', cancelButtonText: 'ยกเลิก',
                inputValidator: (value) => { if (!value) return 'จำเป็นต้องระบุชื่อผู้คืน!' }
            }).then((result) => {
                if (result.isConfirmed) {
                    const returnerName = result.value;
                    const returnsData = [];
                    checked.forEach(cb => {
                        const id = cb.value;
                        const returnedQty = parseInt(document.getElementById(`good-${id}`).value) || 0;
                        const consumedQty = parseInt(document.getElementById(`cons-${id}`).value) || 0;
                        returnsData.push({ historyId: id, returnedQty, consumedQty });
                    });
                    showLoader();
                    callAPI('returnMultipleItems', { returnerName, items: returnsData })
                        .then(res => {
                            hideLoader();
                            if(res.success) { showAlert('ทำรายการรับคืนอุปกรณ์สำเร็จเรียบร้อย!'); markDataStale(); document.getElementById('return-search-input').value = ''; document.getElementById('return-body').innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px;">กรุณาพิมพ์ค้นหาชื่อผู้ยืมด้านบน</td></tr>'; }
                            else { showAlert(res.error, 'error'); }
                        })
                        .catch(e => { hideLoader(); showAlert(e.message || e, 'error'); });
                }
            });
        }

        function loadHistory() {
            showLoader();
            callAPI('getBorrowHistory', {}, 'GET')
                .then(renderHistoryTable)
                .catch(e => { hideLoader(); showAlert(e.message || e, 'error'); });
        }

        function renderHistoryTable(history) {
            dataCacheFlags.history = false; hideLoader(); const container = document.getElementById('history-table-container');
            if(!history || history.length === 0 || history.error) { container.innerHTML = '<p style="text-align:center; padding: 20px;">ไม่มีประวัติการทำรายการ</p>'; return; }
            window.cachedHistory = history;
            writeHistoryTableHTML(history);
        }

        function writeHistoryTableHTML(data) {
            const container = document.getElementById('history-table-container');
            let html = `<table><thead><tr><th>รหัส</th><th>ผู้ยืม</th><th>ชื่ออุปกรณ์</th><th>จำนวนยืม</th><th>วันที่ยืม</th><th>กำหนดคืน</th><th>สถานะ</th><th>คืนสภาพดี</th><th>ใช้ไป</th><th>วันที่คืนจริง</th><th>ผู้คืน</th></tr></thead><tbody id="hist-body">`;
            data.forEach(h => {
                let statusBadge = h.status === 'borrowed' ? '<span style="background:#fef3c7; color:#d97706; padding:3px 8px; border-radius:4px; font-size:12px;">กำลังยืม</span>' : '<span style="background:#d1fae5; color:#059669; padding:3px 8px; border-radius:4px; font-size:12px;">คืนแล้ว</span>';
                html += `<tr><td>${h.historyId}</td><td>${h.borrowerName}</td><td>${h.itemName}</td><td style="text-align:center; font-weight:bold;">${h.borrowQty}</td><td>${h.borrowDate}</td><td>${h.returnDate || '-'}</td><td>${statusBadge}</td><td style="text-align:center;">${h.status==='returned' ? h.returnedQty : '-'}</td><td style="text-align:center; color: var(--danger);">${h.status==='returned' ? h.consumedQty : '-'}</td><td>${h.actualReturnDate || '-'}</td><td>${h.returnerName || '-'}</td></tr>`;
            });
            html += `</tbody></table>`; container.innerHTML = html;
        }

        function filterHistoryTable(keyword) {
            if(!window.cachedHistory) return;
            if(!keyword.trim()) { writeHistoryTableHTML(window.cachedHistory); return; }
            const filtered = window.cachedHistory.filter(h => (h.borrowerName && h.borrowerName.toLowerCase().includes(keyword.toLowerCase())) || (h.itemName && h.itemName.toLowerCase().includes(keyword.toLowerCase())) || (h.historyId && String(h.historyId).includes(keyword)));
            writeHistoryTableHTML(filtered);
        }

        function loadStats() {
            showLoader(); 
            callAPI('getStatistics', {}, 'GET')
                .then(renderStats)
                .catch(e => { hideLoader(); showAlert(e.message || e, 'error'); });
        }

        function renderStats(stats) {
            dataCacheFlags.stats = false; hideLoader(); if(stats.error) { showAlert(stats.error, 'error'); return; }
            
            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card"><div class="value">${stats.totalItems}</div><div class="label">ทั้งหมด (ชิ้น)</div></div>
                <div class="stat-card"><div class="value" style="color:var(--success);">${stats.availableItems}</div><div class="label">พร้อมใช้งาน (ชิ้น)</div></div>
                <div class="stat-card"><div class="value" style="color:var(--warning);">${stats.borrowedItems}</div><div class="label">กำลังถูกยืม (ชิ้น)</div></div>
                <div class="stat-card"><div class="value" style="color:var(--danger);">${stats.totalConsumed}</div><div class="label">สิ้นเปลือง (ชิ้น)</div></div>
                <div class="stat-card"><div class="value" style="color:#8b5cf6;">${stats.totalBorrows}</div><div class="label">ประวัติ (ครั้ง)</div></div>`;

            const tbody = document.getElementById('usage-stats-body'); tbody.innerHTML = '';
            if(stats.itemUsageStats && stats.itemUsageStats.length > 0) {
                 stats.itemUsageStats.forEach(item => { 
                     tbody.innerHTML += `<tr>
                         <td>${item.name}</td>
                         <td style="text-align:center; font-weight:bold;">${item.initialTotal}</td>
                         <td style="text-align:center; color:var(--danger); font-weight:bold;">${item.consumed}</td>
                         <td style="text-align:center; color:#8b5cf6; font-weight:bold;">${item.currentTotal}</td>
                         <td style="text-align:center; color:var(--warning); font-weight:bold;">${item.borrowed}</td>
                         <td style="text-align:center; color:var(--success); font-weight:bold;">${item.available}</td>
                         <td style="text-align:center; color:#6366f1; font-weight:bold;">${item.borrowTimes}</td>
                         <td style="text-align:center; color:#14b8a6; font-weight:bold;">${item.returnTimes}</td>
                     </tr>`; 
                 });
            } else { 
                 tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">ไม่มีข้อมูลสถิติรายอุปกรณ์</td></tr>'; 
            }

            if(myPieChart) myPieChart.destroy(); if(myBarChart) myBarChart.destroy();
            const ctxPie = document.getElementById('statusPieChart').getContext('2d');
            myPieChart = new Chart(ctxPie, { type: 'doughnut', data: { labels: ['พร้อมยืม', 'ถูกยืม', 'ใช้สิ้นเปลือง'], datasets: [{ data: [stats.availableItems, stats.borrowedItems, stats.totalConsumed], backgroundColor: ['#10b981', '#f59e0b', '#ef4444'] }] } });

            const topItems = stats.mostBorrowedItems.slice(0, 5); const ctxBar = document.getElementById('topItemsBarChart').getContext('2d');
            myBarChart = new Chart(ctxBar, { type: 'bar', data: { labels: topItems.map(i => i.name), datasets: [{ label: 'จำนวนครั้งที่ถูกยืม', data: topItems.map(i => i.count), backgroundColor: '#3b82f6' }] }, options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } } });
        }

        document.getElementById('show-manage-modal-btn').addEventListener('click', () => {
            Swal.fire({ title: 'ยืนยันตัวตน', input: 'password', inputLabel: 'กรุณาใส่รหัสผ่านผู้ดูแลระบบ', inputPlaceholder: 'รหัสผ่าน...', showCancelButton: true, confirmButtonColor: 'var(--primary-color)', cancelButtonColor: 'var(--dark-gray)', confirmButtonText: 'เข้าสู่ระบบ', cancelButtonText: 'ยกเลิก', inputValidator: (value) => { if (!value) return 'กรุณากรอกรหัสผ่าน!' }
            }).then((result) => {
                if (result.isConfirmed) {
                    const adminPassword = '1234'; 
                    if (result.value === adminPassword) { loadManageItems(); showModal('manage-items-modal'); } 
                    else { Swal.fire({ icon: 'error', title: 'รหัสผิด!', text: 'ไม่มีสิทธิ์เข้าถึง', confirmButtonColor: 'var(--danger)', confirmButtonText: 'ปิด' }); }
                }
            });
        });

        function loadManageItems() {
             showLoader(); 
             callAPI('getItems', {}, 'GET')
                 .then(res => { currentManageItems = res; renderManageItemsTable(); hideLoader(); })
                 .catch(e => { hideLoader(); showAlert(e.message || e, 'error'); });
        }

        function renderManageItemsTable() {
             const container = document.getElementById('manage-items-table-container');
             if(!currentManageItems || currentManageItems.length===0 || currentManageItems.error) { container.innerHTML = '<p style="text-align:center; padding: 20px;">ไม่มีอุปกรณ์</p>'; return; }
             let html = `<table><thead><tr><th>รูป</th><th>ชื่ออุปกรณ์</th><th>คำอธิบาย</th><th>ตั้งต้น</th><th>พร้อมยืม</th><th>จัดการ</th></tr></thead><tbody>`;
             currentManageItems.forEach(item => {
                 html += `<tr><td style="text-align:center;"><img src="${item.image || getDefaultImage()}" style="width:30px; height:30px; object-fit:contain; border:1px solid #ccc; border-radius:4px;"></td><td>${item.name}</td><td>${item.description || '-'}</td><td style="text-align:center; font-weight:bold;">${item.totalQuantity}</td><td style="text-align:center; font-weight:bold; color:var(--success);">${item.availableQuantity}</td><td style="white-space:nowrap;"><button class="btn" style="background:var(--warning); color:white; padding:4px 8px; margin-right:5px; font-size:13px;" onclick="editItem('${item.id}')">แก้ไข</button><button class="btn" style="background:var(--danger); color:white; padding:4px 8px; font-size:13px;" onclick="deleteItem('${item.id}')">ลบ</button></td></tr>`;
             });
             html += `</tbody></table>`; container.innerHTML = html;
        }

        document.getElementById('open-add-new-item-form').addEventListener('click', () => {
             document.getElementById('item-form').reset(); document.getElementById('item-id').value = ''; document.getElementById('image-preview').style.display = 'none'; document.getElementById('item-image-base64').value = ''; document.getElementById('item-form-title').textContent = 'เพิ่มอุปกรณ์ใหม่'; hideModal('manage-items-modal'); showModal('item-form-modal');
        });

        function editItem(id) {
             const item = currentManageItems.find(i => i.id == id); if(!item) return;
             document.getElementById('item-id').value = item.id; document.getElementById('item-name').value = item.name; document.getElementById('item-description').value = item.description; document.getElementById('item-quantity').value = item.totalQuantity;
             const preview = document.getElementById('image-preview'); preview.src = item.image || ''; preview.style.display = item.image?'block':'none'; document.getElementById('item-image-base64').value = item.image || '';
             document.getElementById('item-form-title').textContent = 'แก้ไขอุปกรณ์'; hideModal('manage-items-modal'); showModal('item-form-modal');
        }

        function deleteItem(id) {
             Swal.fire({ title: 'ยืนยันการลบ?', text: "ต้องการลบใช่หรือไม่?", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#3085d6', confirmButtonText: 'ลบเลย!', cancelButtonText: 'ยกเลิก'
             }).then((result) => {
                 if (result.isConfirmed) { 
                     showLoader(); 
                     callAPI('deleteItem', id)
                         .then(res => { 
                             hideLoader(); 
                             if(res.success) { showAlert('ลบสำเร็จ!'); markDataStale(); loadManageItems(); if(document.getElementById('items-view').classList.contains('active')) loadItems(); } 
                             else { showAlert(res.error, 'error'); } 
                         })
                         .catch(e => { hideLoader(); showAlert(e.message || e, 'error'); });
                 }
             });
        }

        document.getElementById('item-image-upload').addEventListener('change', function(e) {
             const file = e.target.files[0]; if (!file) return;
             if (file.size > 250 * 1024) { showAlert('ขนาดไฟล์เกิน 250KB กรุณาย่อขนาดรูป', 'warning'); e.target.value = ''; return; }
             const reader = new FileReader(); reader.onload = function(event) { const base64String = event.target.result; document.getElementById('item-image-base64').value = base64String; const preview = document.getElementById('image-preview'); preview.src = base64String; preview.style.display = 'block'; }; reader.readAsDataURL(file);
        });

        document.getElementById('item-form').addEventListener('submit', function(e) {
             e.preventDefault(); const id = document.getElementById('item-id').value;
             const payload = { id: id || null, name: document.getElementById('item-name').value, description: document.getElementById('item-description').value, quantity: document.getElementById('item-quantity').value, image: document.getElementById('item-image-base64').value };
             showLoader();
             
             const actionName = id ? 'updateItem' : 'addItem';
             callAPI(actionName, payload)
                 .then(res => { 
                     hideLoader(); 
                     if(res.success) { 
                         showAlert(id ? 'แก้ไขข้อมูลสำเร็จ!' : 'เพิ่มอุปกรณ์สำเร็จ!'); 
                         hideModal('item-form-modal'); showModal('manage-items-modal'); 
                         markDataStale(); loadManageItems(); 
                         if(document.getElementById('items-view').classList.contains('active')) loadItems(); 
                     } else { showAlert(res.error, 'error'); } 
                 })
                 .catch(e => { hideLoader(); showAlert(e.message || e, 'error'); });
        });

        function startQRScanner() {
            showModal('qrcode-modal');
            html5QrCodeScanner = new Html5Qrcode("qr-reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCodeScanner.start({ facingMode: "environment" }, config, onScanSuccess).catch(err => {
                showAlert('ไม่สามารถเปิดกล้องได้: ' + err, 'error');
                stopQRScanner();
            });
        }
        function stopQRScanner() {
            hideModal('qrcode-modal');
            if (html5QrCodeScanner) {
                html5QrCodeScanner.stop().then(() => html5QrCodeScanner.clear()).catch(err => console.error(err));
                html5QrCodeScanner = null;
            }
        }
        function onScanSuccess(decodedText) {
            stopQRScanner();
            document.getElementById('search-input').value = decodedText;
            filterItems(decodedText);
        }

        function exportStatsToPDF() {
             showLoader();
             const element = document.getElementById('usage-stats-container');
             const tableContainer = element.querySelector('.table-container');
             
             const originalMaxHeight = tableContainer.style.maxHeight;
             const originalOverflow = tableContainer.style.overflow;
             tableContainer.style.maxHeight = 'none';
             tableContainer.style.overflow = 'visible';

             const opt = {
                 margin:       10, 
                 filename:     'สรุปสถิติอุปกรณ์.pdf', 
                 image:        { type: 'jpeg', quality: 1 },
                 html2canvas:  { scale: 2 }, 
                 jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
             };

             html2pdf().set(opt).from(element).save().then(() => {
                 tableContainer.style.maxHeight = originalMaxHeight;
                 tableContainer.style.overflow = originalOverflow;
                 hideLoader();
                 showAlert('ดาวน์โหลด PDF สำเร็จ!');
             }).catch(err => {
                 tableContainer.style.maxHeight = originalMaxHeight;
                 tableContainer.style.overflow = originalOverflow;
                 hideLoader();
                 showAlert('เกิดข้อผิดพลาดในการโหลด PDF: ' + err.message, 'error');
             });
        }
